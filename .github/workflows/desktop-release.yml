name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows
          - platform: macos-latest
            label: macOS (Apple Silicon)
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            label: macOS (Intel)
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            label: Linux

    name: Build — ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: Skynet Music ${{ github.ref_name }}
          releaseBody: |
            ## Installation

            | Platform | File |
            |----------|------|
            | Windows  | `*_x64-setup.exe` |
            | macOS (Apple Silicon M1/M2/M3) | `*_aarch64.dmg` |
            | macOS (Intel) | `*_x64.dmg` |
            | Linux | `*_amd64.deb` or `*_amd64.AppImage` |

            **macOS note:** Right-click the app → Open the first time to bypass the unsigned app warning.
            **All platforms:** You must trust the server's TLS certificate before launching — see README_Users.md.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args || '' }}
